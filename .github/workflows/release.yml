name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate tag against VERSION
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(tr -d '\r\n' < VERSION)"

          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match VERSION file ($FILE_VERSION)."
            exit 1
          fi

      - name: Build release notes from changelog
        run: |
          python3 scripts/release_notes.py CHANGELOG.md "${GITHUB_REF_NAME#v}" > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "雾铃小镇 $GITHUB_REF_NAME" \
              --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "雾铃小镇 $GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi
